<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Chef AI — Recipe Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink:     #0E0C09;
  --paper:   #F5F0E8;
  --cream:   #EDE6D6;
  --warm:    #C8975A;
  --gold:    #B07A3A;
  --rust:    #C0522A;
  --sage:    #5A7A5A;
  --muted:   #7A6E60;
  --border:  rgba(14,12,9,0.12);
  --card-bg: #FDFAF4;
  --shadow:  0 4px 32px rgba(14,12,9,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.5;
}
.hero{
  position:relative;
  padding:60px 5% 0;
  text-align:center;
  overflow:hidden;
}
.hero-deco{
  position:absolute;top:-60px;left:50%;transform:translateX(-50%);
  width:600px;height:600px;
  background:radial-gradient(ellipse,rgba(200,151,90,0.15) 0%,transparent 70%);
  pointer-events:none;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:0.72rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;
  color:var(--warm);margin-bottom:18px;
}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';flex:1;width:30px;height:1px;background:var(--warm);opacity:.5;}
h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.8rem,7vw,5.5rem);
  font-weight:300;line-height:1.05;
  letter-spacing:-1px;
  color:var(--ink);
}
h1 em{font-style:italic;color:var(--warm);}
.hero-sub{
  font-size:0.95rem;font-weight:300;color:var(--muted);
  margin-top:14px;line-height:1.7;
  max-width:440px;margin-left:auto;margin-right:auto;
}
.hero-line{
  width:60px;height:1px;background:var(--warm);opacity:.5;
  margin:28px auto 0;
}
.controls{
  max-width:780px;margin:40px auto 0;
  padding:0 5%;
  position:relative;z-index:10;
}
.lang-row{
  display:flex;align-items:center;gap:12px;
  margin-bottom:24px;
}
.lang-label{
  font-size:0.75rem;font-weight:500;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);
  white-space:nowrap;
}
.lang-select-wrap{position:relative;flex-shrink:0;}
.lang-select{
  appearance:none;
  background:var(--card-bg);
  border:1.5px solid var(--border);
  border-radius:8px;
  padding:9px 36px 9px 14px;
  font-family:'DM Sans',sans-serif;
  font-size:0.88rem;font-weight:500;
  color:var(--ink);cursor:pointer;
  transition:border-color .2s;
}
.lang-select:focus{outline:none;border-color:var(--warm);}
.lang-select-wrap::after{
  content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);
  font-size:0.75rem;color:var(--muted);pointer-events:none;
}
.search-box{
  background:var(--card-bg);
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:6px 6px 6px 20px;
  display:flex;align-items:center;gap:8px;
  transition:border-color .25s,box-shadow .25s;
  box-shadow:var(--shadow);
}
.search-box:focus-within{
  border-color:var(--warm);
  box-shadow:0 0 0 3px rgba(200,151,90,0.12),var(--shadow);
}
.search-input{
  flex:1;border:none;background:transparent;
  font-family:'DM Sans',sans-serif;
  font-size:1rem;font-weight:300;color:var(--ink);
  padding:8px 0;
}
.search-input:focus{outline:none;}
.search-input::placeholder{color:var(--muted);font-weight:300;}
.search-btn{
  background:var(--ink);color:var(--paper);
  border:none;border-radius:10px;
  padding:13px 24px;
  font-family:'DM Sans',sans-serif;
  font-size:0.88rem;font-weight:500;
  letter-spacing:.5px;cursor:pointer;
  transition:background .2s,transform .1s;
  display:flex;align-items:center;gap:8px;
  white-space:nowrap;flex-shrink:0;
}
.search-btn:hover{background:#2a2520;}
.search-btn:active{transform:scale(.97);}
.search-btn:disabled{opacity:.6;cursor:not-allowed;}
.section-label{
  font-size:0.68rem;font-weight:600;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--muted);
  margin:24px 0 10px;
}
.meal-btns{display:flex;gap:8px;flex-wrap:wrap;}
.meal-btn{
  background:var(--card-bg);
  border:1.5px solid var(--border);
  border-radius:50px;
  padding:8px 20px;
  font-family:'DM Sans',sans-serif;
  font-size:0.85rem;font-weight:500;
  color:var(--muted);cursor:pointer;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.meal-btn:hover{border-color:var(--warm);color:var(--warm);}
.meal-btn.active{
  background:var(--ink);border-color:var(--ink);
  color:var(--paper);
}
.chips-wrap{display:flex;gap:8px;flex-wrap:wrap;}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--card-bg);
  border:1.5px solid var(--border);
  border-radius:50px;
  padding:7px 16px;
  font-size:0.82rem;font-weight:500;
  color:var(--ink);cursor:pointer;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
  white-space:nowrap;
}
.chip:hover{border-color:var(--warm);color:var(--warm);}
.chip.lowcal{
  background:rgba(90,122,90,0.07);
  border-color:rgba(90,122,90,0.3);
  color:var(--sage);
}
.error-msg{
  background:rgba(192,82,42,0.08);
  border:1px solid rgba(192,82,42,0.25);
  border-radius:10px;padding:12px 16px;
  color:var(--rust);font-size:0.88rem;
  display:none;margin-top:12px;
}
.status-bar{
  display:none;
  text-align:center;padding:40px 20px;
}
.status-text{
  font-family:'Cormorant Garamond',serif;
  font-size:1.15rem;font-style:italic;
  color:var(--muted);
}
.divider{
  display:flex;align-items:center;gap:16px;
  max-width:780px;margin:40px auto 0;padding:0 5%;
  color:var(--muted);font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.recipes-grid{
  max-width:1100px;margin:32px auto 80px;
  padding:0 5%;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:28px;
}
@media(max-width:720px){.recipes-grid{grid-template-columns:1fr;gap:20px;}}
.recipe-card{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  box-shadow:var(--shadow);
  transition:transform .25s,box-shadow .25s;
  display:flex;flex-direction:column;
}
.recipe-card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 48px rgba(14,12,9,0.14);
}
.card-banner{
  position:relative;height:220px;overflow:hidden;
  background:var(--cream);flex-shrink:0;
}
.card-banner img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .4s;
}
.recipe-card:hover .card-banner img{transform:scale(1.04);}
.banner-placeholder{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:4rem;
  background:linear-gradient(135deg,var(--cream),var(--paper));
}
.card-cuisine-tag{
  position:absolute;top:14px;left:14px;
  background:rgba(14,12,9,.7);
  color:var(--paper);
